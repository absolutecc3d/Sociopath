<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOCIOPATH V3</title>
  <link href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Jersey 15', sans-serif;
      background-color: #0b1215;
      color: #ffffff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .title {
      color: #ffffff;
      font-size: 32px;
      margin-bottom: 40px;
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff;
      transform: translate(var(--ttx, 0px), var(--tty, 0px));
      transition: transform 0.15s ease;
    }

    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .box, .bottom-button {
      --tx: 0px;
      --ty: 0px;
      font-family: 'Jersey 15', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.25s ease;
      color: #ffffff;
      text-shadow: 0 0 8px #ffffff, 0 0 15px #ffffff;
      transform: translate(var(--tx, 0px), var(--ty, 0px));
    }

    .box {
      width: 150px;
      height: 150px;
      background-color: #011222;
      border: 2px solid #ffffff;
      border-radius: 10px;
      font-size: 17px;
      box-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff inset;
    }

    .box:hover {
      transform: translate(var(--tx, 0px), var(--ty, 0px)) scale(1.1);
      box-shadow: 0 0 30px #ffffff, 0 0 20px #ffffff inset;
    }

    .bottom-button {
      margin-top: 30px;
      padding: 12px 24px;
      font-size: 16px;
      background-color: #011222;
      border: 2px solid #ffffff;
      border-radius: 8px;
      box-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff inset;
    }

    .bottom-button:hover {
      transform: translate(var(--tx, 0px), var(--ty, 0px)) scale(1.05);
      box-shadow: 0 0 30px #ffffff, 0 0 20px #ffffff inset;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(8px);
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      cursor: pointer;
    }

    .overlay-text {
      font-size: 28px;
      color: #ffffff;
      text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff;
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay">
    <div class="overlay-text">CLICK TO START AUDIO</div>
  </div>

  <div class="title">SOCIOPATH</div>

  <div class="container">
    <div class="box" onclick="window.location.href='https://example.com/link1';">THIS IS</div>
    <div class="box" onclick="window.location.href='https://example.com/link2';">THE SOCIOPATH</div>
    <div class="box" onclick="window.location.href='https://example.com/link3';">V3</div>
  </div>

  <button class="bottom-button" onclick="window.location.href='https://example.com/link4';">CHANGE ANY TEXT, CODE OR COLORS</button>

  <script>
    const boxes = document.querySelectorAll('.box');
    const bottomButton = document.querySelector('.bottom-button');
    const title = document.querySelector('.title');
    const overlay = document.getElementById('overlay');

    // FIXED AUDIO: create iframe AFTER click (bypasses autoplay block)
    overlay.addEventListener('click', () => {
      overlay.style.display = 'none';

      const iframe = document.createElement('iframe');
      iframe.src = "https://www.youtube.com/embed/Jmz8CXm8JLY?autoplay=1&loop=1&playlist=Jmz8CXm8JLY&controls=0";
      iframe.allow = "autoplay";
      iframe.style.display = "none";
      document.body.appendChild(iframe);
    });

    window.addEventListener('mousemove', (e) => {
      const mouseX = e.clientX;
      const mouseY = e.clientY;

      [...boxes, bottomButton].forEach(el => {
        const r = el.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dx = (mouseX - cx) / 15;
        const dy = (mouseY - cy) / 15;
        el.style.setProperty('--tx', dx + 'px');
        el.style.setProperty('--ty', dy + 'px');
      });

      if (title) {
        const tr = title.getBoundingClientRect();
        const tcx = tr.left + tr.width / 2;
        const tcy = tr.top + tr.height / 2;
        const tdx = (mouseX - tcx) / 25;
        const tdy = (mouseY - tcy) / 25;
        title.style.setProperty('--ttx', tdx + 'px');
        title.style.setProperty('--tty', tdy + 'px');
      }
    });
  </script>
</body>
</html>
